<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuLu's Kitchen</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LuLu's Kitchen">
<meta name="theme-color" content="#C2185B">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root {
    --paper: #FBE3EC;
    --paperDim: #F5C9DB;
    --ink: #3B1B2B;
    --inkSoft: #8C6577;
    --basil: #C2185B;
    --rust: #97294F;
    --butter: #F4C6D6;
    --line: #EAC0D2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif; }
  #app { min-height: 100vh; }
  .display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  input, textarea, button { font-family: 'Inter', sans-serif; }
  input:focus, button:focus-visible, textarea:focus { outline: 2px solid var(--basil); outline-offset: 2px; }
  .btn-primary {
    background: var(--basil); color: #fff; border: none; border-radius: 10px; padding: 13px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer; width: 100%;
  }
  .btn-ghost {
    background: transparent; border: 1px solid var(--line); color: var(--ink); border-radius: 8px;
    padding: 8px 12px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-icon { background: transparent; border: none; cursor: pointer; padding: 4px; display: inline-flex; align-items: center; }
  .field {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--line);
    font-size: 14px; background: #fff; color: var(--ink);
  }
  .label { display: block; font-size: 11px; color: var(--inkSoft); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stepper-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--line); background: #fff;
    display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink); font-size: 15px; line-height: 1;
  }
  .stepper-btn.add { background: var(--basil); color: #fff; border-color: var(--basil); }
  .meal-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; display: flex; }
  .ticket-edge {
    background-image: radial-gradient(circle, var(--paper) 6px, transparent 6.5px);
    background-position: top left; background-size: 20px 14px; background-repeat: repeat-x; height: 8px;
  }
  .loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--inkSoft); }
  a.venmo-link { text-decoration: none; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>

<script>
  // ---------- Supabase-backed storage (mimics window.storage's get/set/delete/list) ----------
  const SUPABASE_URL = 'https://crufaonqcxodsghirrwc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_EWI9uKlSAgMWnor_H4Z_TQ_ITMizzeO';
  const REST = `${SUPABASE_URL}/rest/v1/kv_store`;
  // Public half of the notification key pair — safe to expose client-side, same as the
  // Supabase key above. The matching private key lives only as a Supabase Edge Function
  // secret and is never in this file.
  const VAPID_PUBLIC_KEY = 'BArw1Sv07yDNxLn9bb8rH03asaWuTBuEd2HF_bO0NR3PPkqLlwmq-wD1OitT4lvUkELx3t1ZOpHeFIHCjna75mM';
  function sbHeaders(extra) {
    return { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', ...extra };
  }
  window.storage = {
    async get(key) {
      try {
        const res = await fetch(`${REST}?key=eq.${encodeURIComponent(key)}&select=value`, { headers: sbHeaders() });
        if (!res.ok) return null;
        const rows = await res.json();
        if (!rows.length) return null;
        return { key, value: rows[0].value };
      } catch (e) { return null; }
    },
    async set(key, value) {
      try {
        const res = await fetch(`${REST}?on_conflict=key`, {
          method: 'POST',
          headers: sbHeaders({ Prefer: 'resolution=merge-duplicates,return=minimal' }),
          body: JSON.stringify([{ key, value, updated_at: new Date().toISOString() }]),
        });
        if (!res.ok) return null;
        return { key, value };
      } catch (e) { return null; }
    },
    async delete(key) {
      try {
        const res = await fetch(`${REST}?key=eq.${encodeURIComponent(key)}`, { method: 'DELETE', headers: sbHeaders() });
        if (!res.ok) return null;
        return { key, deleted: true };
      } catch (e) { return null; }
    },
    async list(prefix) {
      try {
        const res = await fetch(`${REST}?key=like.${encodeURIComponent(prefix || '')}*&select=key`, { headers: sbHeaders() });
        if (!res.ok) return null;
        const rows = await res.json();
        return { keys: rows.map(r => r.key) };
      } catch (e) { return null; }
    },
  };

  const DREW_VENMO = 'Andrew-Dzib-Galvan';
  const DAY_NAMES = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

  let state = {
    loading: true,
    view: 'order', // order | pinGate | kitchen
    menu: { weekLabel: '', venmoUsername: '', meals: [], orderingOpen: true },
    draftMenu: null,
    auth: { pin: '2468', question: '', answer: '' },
    qty: {},
    customerName: '',
    paymentStep: false,
    paidCheckbox: false,
    submitting: false,
    confirmed: null,
    orderError: '',
    pinInput: '',
    pinError: false,
    forgotMode: false,
    pushSubscribed: false,
    pushPermission: (typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'),
    pushPromptDismissed: localStorage.getItem('dk_push_dismissed') === '1',
    pushBusy: false,
    forgotAnswer: '',
    forgotError: '',
    forgotUnlocked: false,
    forgotNewPin: '',
    forgotNewPin2: '',
    pinDraft1: '',
    pinDraft2: '',
    questionDraft: '',
    answerDraft: '',
    authMessage: null,
    saving: false,
    pasteText: '',
    parseMessage: null,
    orders: [],
    ordersLoading: false,
    archivedOrders: [],
    archivedLoading: false,
    showArchived: false,
  };

  function emptyMeal() {
    return { id: 'm' + Math.random().toString(36).slice(2, 9), name: '', description: '', price: '', imageUrl: '', day: '' };
  }

  function stripBullet(line) {
    return line.replace(/^[•○o\-\*▪·]+\s*/, '').trim();
  }

  function parseMenuText(text, existingMeals) {
    const lines = text.split(/\r?\n/).map(l => l.trim());
    const weekMatch = text.match(/week\s+(\d+)/i);
    const weekLabel = weekMatch ? `Week ${weekMatch[1]}` : null;

    const dayIdxs = [];
    lines.forEach((l, i) => {
      const clean = l.replace(/:$/, '').toLowerCase();
      if (DAY_NAMES.includes(clean)) dayIdxs.push({ idx: i, day: l.replace(/:$/, '') });
    });

    let blocks = [];
    if (dayIdxs.length > 0) {
      dayIdxs.forEach((d, i) => {
        const end = i + 1 < dayIdxs.length ? dayIdxs[i + 1].idx : lines.length;
        const blockLines = lines.slice(d.idx + 1, end).filter(l => l !== '');
        if (blockLines.length > 0) blocks.push({ day: d.day, lines: blockLines });
      });
    } else {
      text.split(/\n\s*\n/).forEach(rb => {
        const bl = rb.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        if (bl.length) blocks.push({ day: null, lines: bl });
      });
    }

    const existingByName = {};
    (existingMeals || []).forEach(m => { if (m.name) existingByName[m.name.trim().toLowerCase()] = m; });

    const meals = blocks.map(b => {
      const cleaned = b.lines.map(stripBullet).filter(Boolean);
      const name = cleaned[0] || b.day || 'Meal';
      const description = cleaned.slice(1).join(' · ');
      const match = existingByName[name.trim().toLowerCase()];
      return {
        id: 'm' + Math.random().toString(36).slice(2, 9),
        name, description,
        price: match ? match.price : '',
        imageUrl: match ? match.imageUrl : '',
        day: b.day || '',
      };
    }).filter(m => m.name);

    return { weekLabel, meals };
  }

  function parseMenuDocHtml(html, existingMeals) {
    const container = document.createElement('div');
    container.innerHTML = html;
    const h1 = container.querySelector('h1');
    const weekMatch = h1 && h1.textContent.match(/week\s+(\d+)/i);
    const weekLabel = weekMatch ? `Week ${weekMatch[1]}` : null;

    const existingByName = {};
    (existingMeals || []).forEach(m => { if (m.name) existingByName[m.name.trim().toLowerCase()] = m; });

    const meals = [];
    const table = container.querySelector('table');
    if (table) {
      const bodyRows = table.querySelectorAll('tbody tr').length ? table.querySelectorAll('tbody tr') : table.querySelectorAll('tr');
      Array.from(bodyRows).forEach(row => {
        const cells = Array.from(row.children).filter(c => c.tagName && /^(td|th)$/i.test(c.tagName));
        if (cells.length < 2) return;
        const dayCell = cells[0];
        const mealCell = cells[1];
        const priceCell = cells[2];
        const ingredientsCell = cells[3];

        const day = dayCell ? dayCell.textContent.trim() : '';
        const mealClone = mealCell ? mealCell.cloneNode(true) : null;
        let imageUrl = '';
        if (mealClone) {
          const imgEl = mealClone.querySelector('img');
          if (imgEl) { imageUrl = imgEl.getAttribute('src') || ''; imgEl.remove(); }
        }
        const name = mealClone ? mealClone.textContent.trim() : '';
        if (!name) return;

        let ingredients = [];
        if (ingredientsCell) {
          const paras = Array.from(ingredientsCell.querySelectorAll('p'));
          const texts = (paras.length ? paras.map(p => p.textContent.trim()) : [ingredientsCell.textContent.trim()]).filter(Boolean);
          ingredients = (texts.length === 1 && texts[0].includes(','))
            ? texts[0].split(',').map(s => s.trim()).filter(Boolean)
            : texts;
        }

        const match = existingByName[name.toLowerCase()];
        const priceText = priceCell ? priceCell.textContent.replace(/[^0-9.]/g, '').trim() : '';
        const parsedPrice = priceText && !isNaN(parseFloat(priceText)) ? priceText : '';

        meals.push({
          id: 'm' + Math.random().toString(36).slice(2, 9),
          name,
          description: ingredients.join(' · '),
          price: parsedPrice || (match ? match.price : ''),
          imageUrl: imageUrl || (match ? match.imageUrl : ''),
          day,
        });
      });
    }
    return { weekLabel, meals };
  }

  let mammothLoadPromise = null;
  function ensureMammothLoaded() {
    if (window.mammoth) return Promise.resolve();
    if (mammothLoadPromise) return mammothLoadPromise;
    mammothLoadPromise = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
      script.onload = () => resolve();
      script.onerror = () => reject(new Error('mammoth failed to load'));
      document.head.appendChild(script);
    });
    return mammothLoadPromise;
  }

  function handleDrop(e, el) {
    e.preventDefault();
    el.style.borderColor = 'var(--line)';
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) processDocxFile(file);
  }
  function handleFileInputChange(input) {
    const file = input.files && input.files[0];
    input.value = '';
    if (file) processDocxFile(file);
  }

  async function processDocxFile(file) {
    state.parseMessage = { type: 'info', text: 'Reading document…' }; render();
    try {
      await ensureMammothLoaded();
      const arrayBuffer = await file.arrayBuffer();
      const result = await window.mammoth.convertToHtml({ arrayBuffer });
      const { weekLabel, meals } = parseMenuDocHtml(result.value, state.draftMenu.meals);
      if (meals.length === 0) {
        state.parseMessage = { type: 'error', text: "Couldn't find any meals in that document — make sure the table rows and columns weren't deleted, like in the template." };
      } else {
        state.draftMenu = { ...state.draftMenu, weekLabel: weekLabel || state.draftMenu.weekLabel, meals };
        scheduleAutosave();
        const missingPrices = meals.filter(m => !m.price).length;
        state.parseMessage = {
          type: 'success',
          text: `Parsed ${meals.length} meal${meals.length !== 1 ? 's' : ''}${weekLabel ? ` for ${weekLabel}` : ''} from the document.${missingPrices ? ` ${missingPrices} need a price before you publish.` : ''}`,
        };
      }
    } catch (e) {
      state.parseMessage = { type: 'error', text: "Could not read that file. Make sure it's a .docx saved from the template, or use the paste-text option below instead." };
    }
    render();
  }

  function escapeHtml(str) {
    return String(str == null ? '' : str).replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
  }

  // ---------- data loading ----------
  async function loadMenu() {
    try {
      const res = await window.storage.get('menu');
      if (res && res.value) {
        state.menu = JSON.parse(res.value);
        if (typeof state.menu.orderingOpen !== 'boolean') state.menu.orderingOpen = true;
      } else {
        state.menu = { weekLabel: 'Week 1', venmoUsername: '', meals: [emptyMeal()], orderingOpen: true };
      }
    } catch (e) {
      state.menu = { weekLabel: 'Week 1', venmoUsername: '', meals: [emptyMeal()], orderingOpen: true };
    }
    state.draftMenu = JSON.parse(JSON.stringify(state.menu));
    state.loading = false;
    render();
  }

  async function loadAuth() {
    try {
      const res = await window.storage.get('kitchenAuth');
      if (res && res.value) {
        state.auth = JSON.parse(res.value);
      }
    } catch (e) { /* keep default */ }
  }

  async function loadOrders(weekLabel) {
    state.ordersLoading = true; render();
    try {
      const list = await window.storage.list(`order:${weekLabel}:`);
      const keys = (list && list.keys) || [];
      const results = await Promise.all(keys.map(async k => {
        try { const r = await window.storage.get(k); return r ? { key: k, ...JSON.parse(r.value) } : null; }
        catch { return null; }
      }));
      state.orders = results.filter(Boolean).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    } catch (e) {
      state.orders = [];
    }
    state.ordersLoading = false; render();
  }

  // ---------- derived ----------
  function totalDue() {
    return state.menu.meals.reduce((sum, m) => sum + (state.qty[m.id] || 0) * (parseFloat(m.price) || 0), 0);
  }
  function selectedCount() {
    return Object.values(state.qty).reduce((a, b) => a + b, 0);
  }
  function grandTotal() {
    return state.orders.reduce((s, o) => s + (o.total || 0), 0);
  }

  // ---------- actions ----------
  function changeQty(id, delta) {
    if (state.menu.orderingOpen === false) return;
    const next = Math.max(0, (state.qty[id] || 0) + delta);
    state.qty = { ...state.qty, [id]: next };
    render();
  }

  function setCustomerName(v) { state.customerName = v; }
  function setPinInput(v) { state.pinInput = v; state.pinError = false; }
  function setPasteText(v) { state.pasteText = v; }
  function setWeekLabel(v) { state.draftMenu.weekLabel = v; scheduleAutosave(); }
  function setVenmoUsername(v) { state.draftMenu.venmoUsername = v; scheduleAutosave(); }
  function setMealField(id, field, v) {
    state.draftMenu.meals = state.draftMenu.meals.map(m => m.id === id ? { ...m, [field]: v } : m);
    scheduleAutosave();
  }

  function setPaidCheckbox(v) { state.paidCheckbox = v; render(); }

  function goToPayment() {
    state.orderError = '';
    if (state.menu.orderingOpen === false) { state.orderError = 'Ordering is closed for this week.'; render(); return; }
    if (!state.customerName.trim()) { state.orderError = 'Enter your name so Drew knows whose order this is.'; render(); return; }
    const items = state.menu.meals.filter(m => (state.qty[m.id] || 0) > 0);
    if (items.length === 0) { state.orderError = 'Pick at least one meal before continuing.'; render(); return; }
    state.paymentStep = true;
    render();
  }

  function backToMeals() { state.paymentStep = false; render(); }

  async function placeOrder() {
    state.orderError = '';
    if (state.menu.orderingOpen === false) { state.orderError = 'Ordering is closed for this week.'; render(); return; }
    if (!state.paidCheckbox) { state.orderError = "Check the box once you've sent payment to Drew."; render(); return; }
    const items = state.menu.meals
      .filter(m => (state.qty[m.id] || 0) > 0)
      .map(m => ({ mealId: m.id, name: m.name, price: parseFloat(m.price) || 0, qty: state.qty[m.id] }));
    if (items.length === 0) { state.orderError = 'Pick at least one meal before sending your order.'; render(); return; }

    state.submitting = true; render();
    try {
      const orderId = 'o' + Date.now() + Math.random().toString(36).slice(2, 6);
      const order = {
        customerName: state.customerName.trim(), items, total: totalDue(), timestamp: Date.now(),
        customerConfirmedPaid: true, paidConfirmed: false,
      };
      const result = await window.storage.set(`order:${state.menu.weekLabel}:${orderId}`, JSON.stringify(order));
      if (!result) throw new Error('save failed');
      state.confirmed = order;
      state.paymentStep = false;
      state.paidCheckbox = false;
    } catch (e) {
      state.orderError = 'Something went wrong sending your order. Please try again.';
    }
    state.submitting = false; render();
  }

  function venmoHref(amount, note) {
    return `venmo://paycharge?txn=pay&recipients=${encodeURIComponent(DREW_VENMO)}&amount=${amount.toFixed(2)}&note=${encodeURIComponent(note)}`;
  }
  function venmoWebFallback() {
    return `https://venmo.com/u/${encodeURIComponent(DREW_VENMO)}`;
  }

  async function enterKitchenView() {
    state.view = 'kitchen';
    state.pinDraft1 = ''; state.pinDraft2 = '';
    state.questionDraft = state.auth.question || '';
    state.answerDraft = state.auth.answer || '';
    state.authMessage = null;
    render();
    try {
      const draftRes = await window.storage.get('menuDraft');
      if (draftRes && draftRes.value) {
        state.draftMenu = JSON.parse(draftRes.value);
        render();
      }
    } catch (e) { /* fall back to published menu already set as draft */ }
    loadOrders(state.draftMenu.weekLabel);
  }

  function tryPin() {
    if (state.pinInput === state.auth.pin) {
      state.pinError = false; state.pinInput = '';
      enterKitchenView();
    } else {
      state.pinError = true; render();
    }
  }

  function openForgotPin() {
    state.forgotMode = true; state.forgotAnswer = ''; state.forgotError = '';
    state.forgotUnlocked = false; state.forgotNewPin = ''; state.forgotNewPin2 = '';
    render();
  }
  function closeForgotPin() { state.forgotMode = false; render(); }
  function setForgotAnswer(v) { state.forgotAnswer = v; }
  function checkForgotAnswer() {
    state.forgotError = '';
    if (!state.auth.question) { state.forgotError = 'No recovery question has been set up yet — ask whoever manages this app to reset your PIN directly.'; render(); return; }
    if (state.forgotAnswer.trim() !== '' && state.forgotAnswer.trim().toLowerCase() === (state.auth.answer || '').trim().toLowerCase()) {
      state.forgotUnlocked = true;
    } else {
      state.forgotError = "That doesn't match — try again.";
    }
    render();
  }
  function setForgotNewPin(v) { state.forgotNewPin = v; }
  function setForgotNewPin2(v) { state.forgotNewPin2 = v; }
  async function saveForgotNewPin() {
    state.forgotError = '';
    if (!state.forgotNewPin.trim()) { state.forgotError = 'Enter a new PIN.'; render(); return; }
    if (state.forgotNewPin !== state.forgotNewPin2) { state.forgotError = "PINs don't match."; render(); return; }
    try {
      const updated = { ...state.auth, pin: state.forgotNewPin.trim() };
      const result = await window.storage.set('kitchenAuth', JSON.stringify(updated));
      if (!result) throw new Error('save failed');
      state.auth = updated;
      state.forgotMode = false;
      enterKitchenView();
    } catch (e) {
      state.forgotError = 'Could not save the new PIN. Please try again.';
      render();
    }
  }

  function setPinDraft1(v) { state.pinDraft1 = v; }
  function setPinDraft2(v) { state.pinDraft2 = v; }
  function setQuestionDraft(v) { state.questionDraft = v; }
  function setAnswerDraft(v) { state.answerDraft = v; }

  async function savePin() {
    state.authMessage = null;
    if (!state.pinDraft1.trim()) { state.authMessage = { type: 'error', text: 'Enter a new PIN.' }; render(); return; }
    if (state.pinDraft1 !== state.pinDraft2) { state.authMessage = { type: 'error', text: "PINs don't match." }; render(); return; }
    try {
      const updated = { ...state.auth, pin: state.pinDraft1.trim() };
      const result = await window.storage.set('kitchenAuth', JSON.stringify(updated));
      if (!result) throw new Error('save failed');
      state.auth = updated;
      state.pinDraft1 = ''; state.pinDraft2 = '';
      state.authMessage = { type: 'success', text: 'PIN updated.' };
    } catch (e) {
      state.authMessage = { type: 'error', text: 'Could not save. Try again.' };
    }
    render();
  }

  async function saveSecurityQuestion() {
    state.authMessage = null;
    if (!state.questionDraft.trim() || !state.answerDraft.trim()) { state.authMessage = { type: 'error', text: 'Fill in both the question and the answer.' }; render(); return; }
    try {
      const updated = { ...state.auth, question: state.questionDraft.trim(), answer: state.answerDraft.trim() };
      const result = await window.storage.set('kitchenAuth', JSON.stringify(updated));
      if (!result) throw new Error('save failed');
      state.auth = updated;
      state.authMessage = { type: 'success', text: 'Recovery question saved.' };
    } catch (e) {
      state.authMessage = { type: 'error', text: 'Could not save. Try again.' };
    }
    render();
  }

  let autosaveTimer = null;
  function flashStatus(elId, text) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = text;
    el.style.opacity = '1';
    clearTimeout(el._flashTimer);
    el._flashTimer = setTimeout(() => { el.style.opacity = '0'; }, 2200);
  }
  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(async () => {
      try {
        const result = await window.storage.set('menuDraft', JSON.stringify(state.draftMenu));
        flashStatus('autosaveIndicator', result ? 'Draft saved' : 'Could not save draft');
      } catch (e) {
        flashStatus('autosaveIndicator', 'Could not save draft');
      }
    }, 1200);
  }

  async function copyShareLink() {
    const url = window.location.origin + window.location.pathname;
    try {
      await navigator.clipboard.writeText(url);
      flashStatus('copyLinkStatus', 'Link copied!');
    } catch (e) {
      prompt('Copy this link:', url);
    }
  }

  async function clearAllOrders() {
    if (state.orders.length === 0) return;
    const proceed = confirm(`Move all ${state.orders.length} order${state.orders.length !== 1 ? 's' : ''} for ${state.menu.weekLabel} to the archive? You can restore them from "Archived orders" below if needed.`);
    if (!proceed) return;
    try {
      await Promise.all(state.orders.map(async (o) => {
        const { key: _k, ...orderData } = o;
        await window.storage.set(`archived:${o.key}`, JSON.stringify(orderData));
        await window.storage.delete(o.key);
      }));
      state.orders = [];
      render();
    } catch (e) {
      alert('Could not clear all orders. Please try again.');
    }
  }

  async function loadArchivedOrders(weekLabel) {
    state.archivedLoading = true; render();
    try {
      const list = await window.storage.list(`archived:order:${weekLabel}:`);
      const keys = (list && list.keys) || [];
      const results = await Promise.all(keys.map(async k => {
        try { const r = await window.storage.get(k); return r ? { key: k, ...JSON.parse(r.value) } : null; }
        catch { return null; }
      }));
      state.archivedOrders = results.filter(Boolean).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    } catch (e) {
      state.archivedOrders = [];
    }
    state.archivedLoading = false; render();
  }

  function toggleShowArchived() {
    state.showArchived = !state.showArchived;
    if (state.showArchived) loadArchivedOrders(state.menu.weekLabel);
    render();
  }

  async function restoreOrder(archivedKey) {
    try {
      const res = await window.storage.get(archivedKey);
      if (!res) return;
      const originalKey = archivedKey.slice('archived:'.length);
      const result = await window.storage.set(originalKey, res.value);
      if (!result) throw new Error('save failed');
      await window.storage.delete(archivedKey);
      state.archivedOrders = state.archivedOrders.filter(o => o.key !== archivedKey);
      loadOrders(state.menu.weekLabel);
    } catch (e) {
      alert('Could not restore that order. Please try again.');
    }
  }

  async function restoreAllArchived() {
    if (state.archivedOrders.length === 0) return;
    try {
      await Promise.all(state.archivedOrders.map(async (o) => {
        const originalKey = o.key.slice('archived:'.length);
        const { key: _k, ...orderData } = o;
        await window.storage.set(originalKey, JSON.stringify(orderData));
        await window.storage.delete(o.key);
      }));
      state.archivedOrders = [];
      loadOrders(state.menu.weekLabel);
    } catch (e) {
      alert('Could not restore all orders. Please try again.');
    }
  }

  function addDraftMeal() { state.draftMenu.meals = [...state.draftMenu.meals, emptyMeal()]; scheduleAutosave(); render(); }
  function removeDraftMeal(id) { state.draftMenu.meals = state.draftMenu.meals.filter(m => m.id !== id); scheduleAutosave(); render(); }

  async function toggleOrderingOpen() {
    const updated = { ...state.menu, orderingOpen: !state.menu.orderingOpen };
    try {
      const result = await window.storage.set('menu', JSON.stringify(updated));
      if (!result) throw new Error('save failed');
      state.menu = updated;
      state.draftMenu = { ...state.draftMenu, orderingOpen: updated.orderingOpen };
      render();
      notifyStatusChange(updated.orderingOpen ? 'open' : 'close', updated.weekLabel);
    } catch (e) {
      alert('Could not update ordering status. Please try again.');
    }
  }

  async function clearPublishedMenu() {
    const proceed = confirm(`Clear the menu customers currently see? They'll see "no meals posted yet" until you publish again. This won't touch what you're editing below.`);
    if (!proceed) return;
    try {
      const cleared = { ...state.menu, meals: [] };
      const result = await window.storage.set('menu', JSON.stringify(cleared));
      if (!result) throw new Error('save failed');
      state.menu = cleared;
      render();
    } catch (e) {
      alert('Could not clear the menu. Please try again.');
    }
  }

  async function publishMenu() {
    const named = state.draftMenu.meals.filter(m => m.name.trim() !== '');
    const missing = named.filter(m => !m.price).length;
    if (missing > 0) {
      const proceed = confirm(`${missing} meal${missing !== 1 ? 's' : ''} don't have a price yet. Publish anyway?`);
      if (!proceed) return;
    }
    state.saving = true; render();
    try {
      const cleaned = { ...state.draftMenu, meals: named };
      const result = await window.storage.set('menu', JSON.stringify(cleaned));
      if (!result) throw new Error('save failed');
      state.menu = cleaned;
      state.draftMenu = JSON.parse(JSON.stringify(cleaned));
      window.storage.set('menuDraft', JSON.stringify(cleaned));
    } catch (e) {
      alert('Could not save the menu. Please try again.');
    }
    state.saving = false; render();
  }

  async function deleteOrder(key) {
    const order = state.orders.find(o => o.key === key);
    if (!order) return;
    try {
      const { key: _k, ...orderData } = order;
      await window.storage.set(`archived:${key}`, JSON.stringify(orderData));
      await window.storage.delete(key);
      state.orders = state.orders.filter(o => o.key !== key);
      render();
    } catch (e) {
      alert('Could not remove that order. Please try again.');
    }
  }

  function exportCSV() {
    const rows = [['Customer', 'Meal', 'Qty', 'Price', 'Line Total', 'Payment Confirmed']];
    state.orders.forEach(o => {
      o.items.forEach(it => rows.push([o.customerName, it.name, it.qty, it.price.toFixed(2), (it.qty * it.price).toFixed(2), '']));
      rows.push([o.customerName, '', '', 'ORDER TOTAL', o.total.toFixed(2), o.paidConfirmed ? 'Yes' : 'No']);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${state.menu.weekLabel.replace(/\s+/g, '_')}_orders.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  function parseFromPaste() {
    if (!state.pasteText.trim()) { state.parseMessage = { type: 'error', text: 'Paste the menu text first.' }; render(); return; }
    const { weekLabel, meals } = parseMenuText(state.pasteText, state.draftMenu.meals);
    if (meals.length === 0) {
      state.parseMessage = { type: 'error', text: "Couldn't find any meals in that — make sure day names (Monday, Tuesday…) are on their own line above each meal." };
      render(); return;
    }
    state.draftMenu = { ...state.draftMenu, weekLabel: weekLabel || state.draftMenu.weekLabel, meals };
    scheduleAutosave();
    const missingPrices = meals.filter(m => !m.price).length;
    state.parseMessage = {
      type: 'success',
      text: `Parsed ${meals.length} meal${meals.length !== 1 ? 's' : ''}${weekLabel ? ` for ${weekLabel}` : ''}.${missingPrices ? ` ${missingPrices} need a price before you publish.` : ''}`,
    };
    state.pasteText = '';
    render();
  }

  let logoTapTimer = null;
  function tapLogo() {
    logoTapCount++;
    clearTimeout(logoTapTimer);
    logoTapTimer = setTimeout(() => { logoTapCount = 0; }, 1500);

  function backToOrder() { state.view = 'order'; state.pinInput = ''; state.pinError = false; state.forgotMode = false; render(); }
  function exitKitchen() { state.view = 'order'; render(); }
  function placeAnotherOrder() { state.confirmed = null; state.qty = {}; state.customerName = ''; state.paymentStep = false; state.paidCheckbox = false; render(); }

  async function togglePaidConfirmed(key) {
    const order = state.orders.find(o => o.key === key);
    if (!order) return;
    const updated = { ...order, paidConfirmed: !order.paidConfirmed };
    delete updated.key;
    try {
      const result = await window.storage.set(key, JSON.stringify(updated));
      if (!result) throw new Error('save failed');
      state.orders = state.orders.map(o => o.key === key ? { ...updated, key } : o);
      render();
    } catch (e) {
      alert('Could not update payment status. Please try again.');
    }
  }

  // ---------- push notifications ----------
  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      const sub = await reg.pushManager.getSubscription();
      state.pushSubscribed = !!sub;
      render();
    } catch (e) {
      // Non-critical — notifications just won't be available this session.
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const arr = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; i++) arr[i] = rawData.charCodeAt(i);
    return arr;
  }

  async function hashEndpoint(endpoint) {
    const enc = new TextEncoder().encode(endpoint);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
  }

  async function enableNotifications() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      alert("Notifications aren't supported on this browser/device.");
      return;
    }
    state.pushBusy = true; render();
    try {
      const permission = await Notification.requestPermission();
      state.pushPermission = permission;
      if (permission !== 'granted') { state.pushBusy = false; render(); return; }

      const reg = await navigator.serviceWorker.register('sw.js');
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      const subId = await hashEndpoint(sub.endpoint);
      const result = await window.storage.set(`pushSub:${subId}`, JSON.stringify(sub));
      if (!result) throw new Error('save failed');
      state.pushSubscribed = true;
    } catch (e) {
      alert('Could not enable notifications. Please try again.');
    }
    state.pushBusy = false;
    render();
  }

  function dismissPushPrompt() {
    state.pushPromptDismissed = true;
    localStorage.setItem('dk_push_dismissed', '1');
    render();
  }

  async function notifyStatusChange(eventType, weekLabel) {
    try {
      await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: eventType, weekLabel }),
      });
    } catch (e) {
      // Best-effort — never block Drew's open/close toggle on a push failure.
    }
  }

  function render() {
    const app = document.getElementById('app');
    if (state.loading) { app.innerHTML = '<div class="loading">Loading…</div>'; return; }
    if (state.view === 'order') app.innerHTML = renderOrderView();
    else if (state.view === 'pinGate') app.innerHTML = renderPinGate();
    else if (state.view === 'kitchen') app.innerHTML = renderKitchenView();
    requestAnimationFrame(sizeBottomSpacer);
  }

    const bar = document.getElementById('ticketBar');
    const spacer = document.getElementById('bottomSpacer');
    if (!spacer) return;
    spacer.style.height = bar ? (bar.offsetHeight + 16) + 'px' : '0px';

  function renderConfirmation() {
    const c = state.confirmed;
    const receiptRows = c.items.map(it => `
      <div class="mono" style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;">
        <span>${it.qty} × ${escapeHtml(it.name)}</span><span>$${(it.qty * it.price).toFixed(2)}</span>
      </div>`).join('');

    return `
      <div style="max-width:480px;margin:0 auto;padding:60px 24px;">
        <div style="text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--basil);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:24px;">✓</div>
          <h2 class="display" style="font-size:24px;font-weight:600;margin:0 0 4px;">Order sent to Drew</h2>
          <p style="color:var(--inkSoft);font-size:14px;margin-bottom:24px;">Thanks, ${escapeHtml(c.customerName)}. Here's your ticket for ${escapeHtml(state.menu.weekLabel)}. Drew will confirm your payment came through.</p>
        </div>
        <div style="background:#fff;border:1px dashed var(--line);border-radius:10px;padding:16px 18px;">
          ${receiptRows}
          <div style="border-top:1px solid var(--line);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;">
            <span class="mono" style="font-weight:600;font-size:13px;">TOTAL</span>
            <span class="mono" style="font-weight:600;font-size:13px;">$${c.total.toFixed(2)}</span>
          </div>
        </div>
        <p style="font-size:12px;color:var(--inkSoft);text-align:center;margin-top:16px;">
          Didn't finish sending payment yet? Send <strong>$${c.total.toFixed(2)}</strong> to <strong>@${DREW_VENMO}</strong>
          with note "${escapeHtml(state.menu.weekLabel)} — ${escapeHtml(c.customerName)}" — or visit
          <a href="${venmoWebFallback()}" style="color:var(--basil);">${venmoWebFallback()}</a>
        </p>
        <button class="btn-ghost" onclick="placeAnotherOrder()" style="width:100%;justify-content:center;margin-top:24px;">Place another order</button>
      </div>
    `;
  }

  function renderPinGate() {
    if (state.forgotMode) {
      const body = !state.auth.question
        ? `<p style="font-size:13px;color:var(--inkSoft);">No recovery question has been set up yet. Ask whoever manages this site to reset your PIN directly, or set up a recovery question once you're back in.</p>`
        : !state.forgotUnlocked
        ? `
          <p style="font-size:14px;font-weight:600;margin:0 0 12px;">${escapeHtml(state.auth.question)}</p>
          <input class="field" placeholder="Your answer" value="${escapeHtml(state.forgotAnswer)}"
            oninput="setForgotAnswer(this.value)" onkeydown="if(event.key==='Enter') checkForgotAnswer()">
          ${state.forgotError ? `<p style="color:var(--rust);font-size:13px;margin-top:8px;">${escapeHtml(state.forgotError)}</p>` : ''}
          <button class="btn-primary" onclick="checkForgotAnswer()" style="margin-top:16px;">Check answer</button>
        `
        : `
          <p style="font-size:13px;color:var(--inkSoft);margin:0 0 12px;">That's right — set a new PIN:</p>
          <input class="field" type="password" inputmode="numeric" placeholder="New PIN" value="${escapeHtml(state.forgotNewPin)}"
            oninput="setForgotNewPin(this.value)" style="margin-bottom:8px;text-align:center;letter-spacing:4px;">
          <input class="field" type="password" inputmode="numeric" placeholder="Confirm new PIN" value="${escapeHtml(state.forgotNewPin2)}"
            oninput="setForgotNewPin2(this.value)" style="text-align:center;letter-spacing:4px;">
          ${state.forgotError ? `<p style="color:var(--rust);font-size:13px;margin-top:8px;">${escapeHtml(state.forgotError)}</p>` : ''}
          <button class="btn-primary" onclick="saveForgotNewPin()" style="margin-top:16px;">Save new PIN & log in</button>
        `;
      return `
        <div style="max-width:380px;margin:0 auto;padding:80px 24px 24px;">
          <button class="btn-ghost" onclick="closeForgotPin()">← Back</button>
          <div style="margin-top:32px;text-align:center;">
            <h2 class="display" style="font-size:22px;margin:0 0 16px;font-weight:600;">Forgot PIN</h2>
            ${body}
          </div>
        </div>
      `;
    }
    return `
      <div style="max-width:380px;margin:0 auto;padding:80px 24px 24px;">
        <button class="btn-ghost" onclick="backToOrder()">← Back to menu</button>
        <div style="margin-top:32px;text-align:center;">
          <div style="font-size:24px;">🔒</div>
          <h2 class="display" style="font-size:22px;margin:12px 0 4px;font-weight:600;">LuLu's kitchen</h2>
          <p style="color:var(--inkSoft);font-size:14px;margin-bottom:20px;">Enter the kitchen PIN to update the menu.</p>
          <input class="field" type="password" inputmode="numeric" placeholder="PIN" id="pinField"
            style="text-align:center;letter-spacing:4px;font-size:18px;"
            value="${escapeHtml(state.pinInput)}"
            oninput="setPinInput(this.value)"
            onkeydown="if(event.key==='Enter') tryPin()">
          ${state.pinError ? `<p style="color:var(--rust);font-size:13px;margin-top:8px;">That's not it — try again.</p>` : ''}
          <button class="btn-primary" onclick="tryPin()" style="margin-top:16px;">Unlock</button>
          <button class="btn-ghost" onclick="openForgotPin()" style="margin-top:12px;background:transparent;border:none;font-size:12px;color:var(--inkSoft);margin-left:auto;margin-right:auto;">Forgot PIN?</button>
        </div>
      </div>
    `;
  }

  function renderKitchenView() {
    const dm = state.draftMenu;
    const mealCards = dm.meals.map((m, idx) => `
      <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span class="mono" style="font-size:11px;color:var(--inkSoft);">MEAL ${idx + 1}</span>
          <button class="btn-icon" style="color:var(--rust);" onclick="removeDraftMeal('${m.id}')">🗑</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input class="field" style="width:90px;" placeholder="Day" value="${escapeHtml(m.day)}" oninput="setMealField('${m.id}','day',this.value)">
          <input class="field" style="flex:1;font-weight:600;" placeholder="Meal name" value="${escapeHtml(m.name)}" oninput="setMealField('${m.id}','name',this.value)">
        </div>
        <textarea class="field" rows="2" style="margin-bottom:8px;resize:vertical;" placeholder="Ingredients / description"
          oninput="setMealField('${m.id}','description',this.value)">${escapeHtml(m.description)}</textarea>
        <div style="display:flex;gap:8px;">
          <div>
            <input class="field" style="width:90px;" type="number" step="0.01" placeholder="Price" value="${escapeHtml(m.price)}" oninput="setMealField('${m.id}','price',this.value)">
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:6px;">
            <span style="font-size:14px;">🖼</span>
            <input class="field" style="flex:1;" placeholder="Photo URL (Google Photos / Imgur link)" value="${escapeHtml(m.imageUrl)}" oninput="setMealField('${m.id}','imageUrl',this.value)">
          </div>
        </div>
      </div>
    `).join('');

    const ordersHtml = state.ordersLoading
      ? `<p style="color:var(--inkSoft);font-size:13px;">Loading orders…</p>`
      : state.orders.length === 0
      ? `<p style="color:var(--inkSoft);font-size:13px;">No orders yet for this week.</p>`
      : `
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">
          ${state.orders.map(o => `
            <div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;">
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                <strong style="font-size:14px;">${escapeHtml(o.customerName)}</strong>
                <div style="display:flex;align-items:center;gap:10px;">
                  <span class="mono" style="font-size:14px;color:var(--rust);">$${o.total.toFixed(2)}</span>
                  <button class="btn-icon" style="color:var(--inkSoft);" onclick="deleteOrder('${o.key}')">✕</button>
                </div>
              </div>
              ${o.items.map(it => `
                <div class="mono" style="font-size:12px;color:var(--inkSoft);display:flex;justify-content:space-between;">
                  <span>${it.qty} × ${escapeHtml(it.name)}</span><span>$${(it.qty * it.price).toFixed(2)}</span>
                </div>`).join('')}
              <button onclick="togglePaidConfirmed('${o.key}')" style="margin-top:8px;border:none;cursor:pointer;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;letter-spacing:0.3px;
                background:${o.paidConfirmed ? 'var(--basil)' : '#F5E6D8'};color:${o.paidConfirmed ? '#fff' : 'var(--rust)'};">
                ${o.paidConfirmed ? '✓ Paid — confirmed' : '⏳ Awaiting your confirmation'}
              </button>
            </div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <span class="mono" style="font-size:13px;font-weight:600;">Grand total: $${grandTotal().toFixed(2)}</span>
          <div style="display:flex;gap:8px;">
            <button class="btn-ghost" onclick="clearAllOrders()">🗑 Clear all orders</button>
            <button class="btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
          </div>
        </div>`;

    const archivedHtml = `
      <button class="btn-ghost" onclick="toggleShowArchived()" style="font-size:12px;">${state.showArchived ? '▲' : '▼'} Archived orders</button>
      ${state.showArchived ? `
        <div style="margin-top:10px;">
          ${state.archivedLoading
            ? `<p style="color:var(--inkSoft);font-size:13px;">Loading…</p>`
            : state.archivedOrders.length === 0
            ? `<p style="color:var(--inkSoft);font-size:13px;">Nothing archived for this week.</p>`
            : `
              <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">
                ${state.archivedOrders.map(o => `
                  <div style="background:#FDF7F9;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
                    <div>
                      <strong style="font-size:13px;">${escapeHtml(o.customerName)}</strong>
                      <span class="mono" style="font-size:12px;color:var(--inkSoft);margin-left:8px;">$${o.total.toFixed(2)}</span>
                    </div>
                    <button class="btn-ghost" onclick="restoreOrder('${o.key}')" style="font-size:11px;">↺ Restore</button>
                  </div>`).join('')}
              </div>
              <button class="btn-ghost" onclick="restoreAllArchived()" style="font-size:12px;">↺ Restore all</button>
            `}
        </div>
      ` : ''}
    `;

    return `
      <div style="max-width:720px;margin:0 auto;padding:24px 16px 60px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <button class="btn-ghost" onclick="exitKitchen()">← Back to menu</button>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="copyLinkStatus" class="mono" style="font-size:11px;color:var(--basil);opacity:0;transition:opacity .4s;"></span>
            <span class="mono" style="font-size:11px;color:var(--inkSoft);text-transform:uppercase;">Kitchen view</span>
          </div>
        </div>

        <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <div>
            <label class="label" style="margin-bottom:2px;">Ordering status</label>
            <p style="margin:0;font-size:14px;font-weight:600;color:${state.menu.orderingOpen !== false ? 'var(--basil)' : 'var(--rust)'};">
              ${state.menu.orderingOpen !== false ? '🔓 Open — customers can order' : '🔒 Closed — customers cannot order'}
            </p>
          </div>
          <button class="btn-primary" style="width:auto;padding:10px 16px;white-space:nowrap;background:${state.menu.orderingOpen !== false ? 'var(--rust)' : 'var(--basil)'};" onclick="toggleOrderingOpen()">
            ${state.menu.orderingOpen !== false ? 'Close ordering' : 'Open ordering'}
          </button>
        </div>

        <h2 class="display" style="font-size:22px;font-weight:600;margin:0 0 6px;">Drop in this week's menu</h2>
        <p style="font-size:12.5px;color:var(--inkSoft);margin:0 0 10px;">
          Fill out <a href="Weekly_Meal_Menu_Template.docx" download style="color:var(--basil);">the weekly template</a>, then drag it in below.
        </p>
        <div id="dropzone"
          style="border:2px dashed var(--line);border-radius:12px;padding:24px;text-align:center;cursor:pointer;margin-bottom:8px;transition:border-color .15s;"
          ondragover="event.preventDefault();this.style.borderColor='var(--basil)';"
          ondragleave="this.style.borderColor='var(--line)';"
          ondrop="handleDrop(event, this)"
          onclick="document.getElementById('docxFileInput').click()">
          <div style="font-size:26px;">📄</div>
          <p style="margin:8px 0 2px;font-weight:600;font-size:14px;">Drag & drop the filled-out template here</p>
          <p style="font-size:12px;color:var(--inkSoft);margin:0;">or tap to choose the file</p>
          <input type="file" id="docxFileInput" accept=".docx" style="display:none;" onchange="handleFileInputChange(this)">
        </div>

        <details style="margin-bottom:8px;">
          <summary style="font-size:11px;color:var(--inkSoft);cursor:pointer;">Having trouble? Paste text instead</summary>
          <div style="margin-top:10px;">
            <textarea class="field mono" rows="5" style="margin-bottom:8px;resize:vertical;font-size:12.5px;"
              placeholder="Monday&#10;Salmon Bite Bowl&#10;  Salmon (GF Teriyaki Marinade)&#10;  Cucumber&#10;  Avocado&#10;&#10;Tuesday&#10;..."
              oninput="setPasteText(this.value)">${escapeHtml(state.pasteText)}</textarea>
            <button class="btn-ghost" onclick="parseFromPaste()">Parse pasted text</button>
          </div>
        </details>
        ${state.parseMessage ? `<p style="font-size:12.5px;margin:0 0 24px;color:${state.parseMessage.type === 'error' ? 'var(--rust)' : state.parseMessage.type === 'info' ? 'var(--inkSoft)' : 'var(--basil)'};">${escapeHtml(state.parseMessage.text)}</p>` : '<div style="margin-bottom:24px;"></div>'}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 class="display" style="font-size:22px;font-weight:600;margin:0;">This week's menu</h2>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="autosaveIndicator" class="mono" style="font-size:11px;color:var(--inkSoft);opacity:0;transition:opacity .4s;"></span>
            <button id="copyLinkBtn" class="btn-ghost" onclick="copyShareLink()" style="font-size:12px;">🔗 Copy link</button>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <label class="label">Week label</label>
          <input class="field" placeholder="Week 21" value="${escapeHtml(dm.weekLabel)}" oninput="setWeekLabel(this.value)">
        </div>

        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:12px;">${mealCards}</div>

        <button class="btn-ghost" onclick="addDraftMeal()" style="margin-bottom:20px;">+ Add a meal</button>
        <button class="btn-primary" onclick="publishMenu()" style="margin-bottom:12px;" ${state.saving ? 'disabled' : ''}>
          ${state.saving ? 'Saving…' : 'Save & publish menu'}
        </button>
        <button class="btn-ghost" onclick="clearPublishedMenu()" style="margin-bottom:36px;color:var(--rust);">🧹 Clear customer-facing menu</button>

        <div style="border-top:1px solid var(--line);padding-top:24px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <h2 class="display" style="font-size:22px;font-weight:600;margin:0;">Orders — ${escapeHtml(state.menu.weekLabel)}</h2>
            <button class="btn-icon" onclick="reloadOrders()">🧾</button>
          </div>
          ${ordersHtml}
          <div style="margin-top:16px;">${archivedHtml}</div>
        </div>

        <div style="border-top:1px solid var(--line);padding-top:24px;margin-top:24px;">
          <h2 class="display" style="font-size:22px;font-weight:600;margin:0 0 12px;">Security</h2>
          <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;">
            <label class="label">Change kitchen PIN</label>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
              <input class="field" type="password" inputmode="numeric" placeholder="New PIN" value="${escapeHtml(state.pinDraft1)}" oninput="setPinDraft1(this.value)">
              <input class="field" type="password" inputmode="numeric" placeholder="Confirm" value="${escapeHtml(state.pinDraft2)}" oninput="setPinDraft2(this.value)">
            </div>
            <button class="btn-ghost" onclick="savePin()">Save new PIN</button>
          </div>
          <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;">
            <label class="label">Recovery question (used if you forget your PIN)</label>
            <input class="field" placeholder="e.g. What's your dog's name?" value="${escapeHtml(state.questionDraft)}" oninput="setQuestionDraft(this.value)" style="margin-bottom:8px;">
            <input class="field" placeholder="Answer" value="${escapeHtml(state.answerDraft)}" oninput="setAnswerDraft(this.value)" style="margin-bottom:8px;">
            <button class="btn-ghost" onclick="saveSecurityQuestion()">Save recovery question</button>
          </div>
          ${state.authMessage ? `<p style="font-size:12.5px;margin-top:10px;color:${state.authMessage.type === 'error' ? 'var(--rust)' : 'var(--basil)'};">${escapeHtml(state.authMessage.text)}</p>` : ''}
        </div>
      </div>
    `;
  }

  window.addEventListener('resize', sizeBottomSpacer);

  loadAuth();
  loadMenu();
  initPush();
</script>
</body>
</html>
